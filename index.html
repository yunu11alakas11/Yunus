    let selectedEn = null, selectedTr = null, activeLevel = "", timerInterval = null, timeLeft = 30; 
    let roundCount = 1; 
    let playerName = "Player"; 

  onValue(ref(db, 'leaderboard'), (snapshot) => {
    const list = document.getElementById('leaderboard-list');
    if (!list) return;
    
    let scores = [];
    snapshot.forEach(child => { 
        const data = child.val();
        // Sadece mevcut seçili seviyeye ait skorları filtrele (Opsiyonel)
        if(data.level === activeLevel || !activeLevel) {
            scores.push(data); 
        }
    });

    // Küçükten büyüğe (en hızlı bitiren üste) sırala
    scores.sort((a, b) => a.score - b.score);

    // Sadece ilk 5'i al ve ekrana bas
    list.innerHTML = scores.slice(0, 5).map(s => 
        `<div style="border-bottom:1px solid #ddd; padding:5px;">
            <b>${s.name}</b> (${s.level}): ${s.score}s
        </div>`
    ).join("");
});
    async function askDolphinAI() {
        const qInput = document.getElementById('ai-question');
        const bubble = document.getElementById('ai-bubble');
        const btn = document.getElementById('ask-ai-btn');
        const question = qInput.value.trim();
        if(!question) return;
        bubble.innerText = "Thinking...";
        bubble.style.display = "block";
        btn.disabled = true;
        const dolphinRules = `
            - Your name is 'Dolphin AI'. You are a friendly, helpful assistant.
            - PRIMARY GOAL: Help the user understand English idioms.
            - LANGUAGE RULE: Always reply in the SAME language the user uses.
            - Keep responses concise (max 2 sentences).
        `;
        try {
            const myKey = "AIzaSyAD86nNXHU7pR0g2Fxd-TvYv3ZYVALRkw8"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${myKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: dolphinRules + "\n\n User Message: " + question }] }] })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                bubble.innerText = data.candidates[0].content.parts[0].text;
            } else { bubble.innerText = "Try again..."; }
        } catch (error) { bubble.innerText = "Connection failed."; }
        finally { btn.disabled = false; }
    }

    window.startGame = function(lvl) {
        roundCount = 1;
        const nameBox = document.getElementById('player-name-input');
        playerName = (nameBox && nameBox.value.trim() !== "") ? nameBox.value.trim() : "Player";
        activeLevel = lvl;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('lvl-title').innerText = lvl.toUpperCase();
        const rd = document.getElementById('round-display');
        if(rd) rd.innerText = `Round: ${roundCount} / 5`;
        renderCards();
        startTimer();
    };

    function renderCards() {
        const area = document.getElementById('match-area');
        if(!area) return;
        area.innerHTML = '';
        let count = 5;
        if(activeLevel === 'easy') count = 3;
        else if(activeLevel === 'normal') count = 4;
        else if(activeLevel === 'hard') count = 5;
        else if(activeLevel === 'multihard') count = 6;
        else if(activeLevel === 'impossible') count = 7;

        let levelData = [...idiomsData[activeLevel]];
        let selectedData = levelData.sort(() => 0.5 - Math.random()).slice(0, count);
        let leftItems = selectedData.map((item, index) => ({ text: item.en, matchId: index }));
        let rightItems = selectedData.map((item, index) => ({ text: item.tr, matchId: index }));
        leftItems.sort(() => 0.5 - Math.random());
        rightItems.sort(() => 0.5 - Math.random());

        const createColumn = (items, type) => {
            let col = document.createElement('div');
            col.style.display = "flex"; col.style.flexDirection = "column"; col.style.gap = "10px";
            items.forEach(item => {
                let card = document.createElement('div');
                card.className = 'card';
                card.innerText = item.text;
                card.onclick = () => handleMatch(card, item.matchId, type);
                col.appendChild(card);
            });
            return col;
        };
        area.appendChild(createColumn(leftItems, 'en'));
        area.appendChild(createColumn(rightItems, 'tr'));
    }

   function handleMatch(card, id, type) {
    // Kart zaten doğruysa veya seçiliyse işlem yapma
    if(card.classList.contains('correct') || card.classList.contains('selected')) return;

    // Seçim Mantığı
    if(type === 'en') { 
        if(selectedEn) selectedEn.classList.remove('selected'); 
        selectedEn = card; selectedEn.matchId = id; 
    } else { 
        if(selectedTr) selectedTr.classList.remove('selected'); 
        selectedTr = card; selectedTr.matchId = id; 
    }
    card.classList.add('selected');

    // İki kart da seçildiyse kontrol et
    if(selectedEn && selectedTr) {
        if(selectedEn.matchId === selectedTr.matchId) {
            // --- EŞLEŞME DOĞRU ---
            selectedEn.className = 'card correct'; 
            selectedTr.className = 'card correct';
            selectedEn = null; 
            selectedTr = null;

            // Turdaki tüm kartlar bitti mi?
            if(document.querySelectorAll('.card:not(.correct)').length === 0) {
                
                if (roundCount < 5) {
                    // --- YENİ ROUND BAŞLAT ---
                    roundCount++;
                    const rd = document.getElementById('round-display');
                    if(rd) rd.innerText = `Round: ${roundCount} / 5`;
                    
                    startTimer(); // Süreyi 30'a sıfırlar
                    setTimeout(renderCards, 600);
                } else {
                    // --- OYUN TAMAMEN BİTTİ (5. ROUND SONU) ---
                    // "Else" kısmı tam burası, yani 5 round dolunca çalışacak yer.
                    
                    clearInterval(timerInterval);
                    const finalScore = (30 - timeLeft).toFixed(1);

                    // Firebase'e Kaydet
                    push(ref(db, 'leaderboard'), { 
                        name: playerName, 
                        score: parseFloat(finalScore),
                        level: activeLevel 
                    });

                    // 1. Kartları gizle (Böylece mevcut butonun yukarı kayar)
                    const matchArea = document.getElementById('match-area');
                    if(matchArea) matchArea.style.display = "none";

                    // 2. Butonun üstündeki boşluğa bilgileri yazdır (Site mesajı yerine)
                    const infoDiv = document.getElementById('end-info');
                    if(infoDiv) {
                        infoDiv.innerHTML = `
                            <h2 style="color:#2ecc71;">Congratulations ${playerName}!</h2>
                            <p>TİME: <b>${finalScore}s</b> | LEVEL: <b>${activeLevel.toUpperCase()}</b></p>
                        `;
                        infoDiv.style.display = "block";
                    }
                }
            }
        } else {
            // --- EŞLEŞME YANLIŞ ---
            let e = selectedEn, t = selectedTr;
            e.className = 'card wrong'; 
            t.className = 'card wrong';
            
            setTimeout(() => { 
                e.className = 'card'; 
                t.className = 'card'; 
            }, 500);
            
            selectedEn = null; 
            selectedTr = null;
        }
    }
}

    function startTimer() {
        timeLeft = 30; // SÜRE TEKRAR 30 OLDU
        const bar = document.getElementById('timer-bar');
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            if(bar) bar.style.width = (timeLeft / 30 * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); alert("Time is up!"); location.reload(); }
        }, 100);
    }

    window.openDictionary = function() {
        const listContainer = document.getElementById('dict-list');
        const modal = document.getElementById('dict-modal');
        if(!listContainer || !modal) return;
        let allIdioms = [];
        for (let level in idiomsData) { allIdioms = allIdioms.concat(idiomsData[level]); }
        allIdioms.sort((a, b) => a.en.localeCompare(b.en));
        let html = "";
        allIdioms.forEach(item => { html += `<div class="idiom-item"><b>${item.en}</b>: ${item.tr}</div>`; });
        listContainer.innerHTML = html;
        modal.style.display = "block";
    };
    window.closeDictionary = function() {
        const modal = document.getElementById('dict-modal');
        if(modal) modal.style.display = "none";
    };

    document.getElementById('ask-ai-btn').onclick = askDolphinAI;
    document.getElementById('ai-question').onkeypress = (e) => { if(e.key === 'Enter') askDolphinAI(); };
    document.querySelectorAll('.lvl-btn').forEach(btn => {
        btn.onclick = () => startGame(btn.getAttribute('data-lvl'));
    });
    


</script>
